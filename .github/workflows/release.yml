name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Sync upstream game
        run: npm run sync-upstream

      - name: Install upstream dependencies
        run: |
          cd upstream-game
          npm install
          cd ..

      - name: Build frontend
        run: npm run build:frontend
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Verify repo state
        run: npm run verify

      - name: Build and sign Tauri app
        run: npm run tauri:build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sign release artifacts
        run: npm run release:sign
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Write updater manifest
        run: npm run release:manifest

      - name: Verify release artifacts
        run: npm run verify:release

      - name: List bundle files
        run: |
          echo "=== NSIS bundle ==="
          dir src-tauri\target\release\bundle\nsis\
          echo "=== MSI bundle ==="
          dir src-tauri\target\release\bundle\msi\
          echo "=== Updater manifest ==="
          dir src-tauri\target\release\bundle\latest.json

      - name: Publish GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $assets = @(
            "src-tauri\target\release\bundle\nsis\PACDeluxe_${version}_x64-setup.exe",
            "src-tauri\target\release\bundle\nsis\PACDeluxe_${version}_x64-setup.exe.sig",
            "src-tauri\target\release\bundle\msi\PACDeluxe_${version}_x64_en-US.msi",
            "src-tauri\target\release\bundle\msi\PACDeluxe_${version}_x64_en-US.msi.sig",
            "src-tauri\target\release\bundle\latest.json"
          )
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --title "PACDeluxe $tag" --notes "See the assets below to download and install this version."
          }

      - name: Verify published updater endpoint
        run: npm run verify:updater -- --retries=10 --delay-ms=15000
